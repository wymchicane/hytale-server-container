name: "Deploy github page"

# Description: Compiles and publishes the project documentation to GitHub Pages.
# 1. Triggers exclusively when changes are made inside the 'docs/' directory.
# 2. Builds static pages using Jekyll from './docs' into './_site'.
# 3. Dynamically injects an SEO-optimized sitemap mapped to the production domain.
# 4. Packages and securely deploys the build artifact via the GitHub Pages runtime.

on:
  push:
    branches: ["main"]
    paths:
      - 'docs/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    env:
      TZ: Europe/Amsterdam
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Copy root assets into docs
        run: |
          mkdir -p docs/assets/images docs/assets/videos
          cp -n assets/images/* docs/assets/images/ 2>/dev/null || true
          cp -n assets/videos/* docs/assets/videos/ 2>/dev/null || true

      - name: Build with Jekyll
        uses: actions/jekyll-build-pages@v1.0.13
        with:
          source: ./docs
          destination: ./_site

      - name: Generate Sitemap
        uses: cicirello/generate-sitemap@v1.10.4
        with:
          base-url-path: https://hytale-server-container.com
          path-to-root: ./_site
          drop-html-extension: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: "./_site"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5